name: release

# build a binary per target and attach it to the release for the pushed tag,
# and publish the crate to crates.io
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # trusted publishing (OIDC): no long-lived token secret. one-time setup on
  # crates.io: cargo-tribute -> Settings -> Trusted Publishing -> add this repo
  # with workflow file release.yml.
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      # a tag on the wrong commit would publish whatever version Cargo.toml holds
      - name: tag must match the crate version
        run: test "${GITHUB_REF_NAME#v}" = "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: i686-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: arm-unknown-linux-musleabihf, os: ubuntu-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: i686-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      # installs the target, cross-compiles with cross when needed, strips,
      # tars as {bin}-{target}.tar.gz, and uploads to the tag's release.
      # tar: all / zip: none forces tar.gz on windows too, so every asset matches
      # the binstall pkg-fmt = "tgz" in Cargo.toml.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cargo-tribute
          target: ${{ matrix.target }}
          # prebuilt binaries ship with --audit; source `cargo install` is lean by default.
          features: audit
          archive: $bin-$target
          tar: all
          zip: none
          token: ${{ secrets.GITHUB_TOKEN }}
